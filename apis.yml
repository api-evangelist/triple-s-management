apis:
  - aid: triple-s-management:triple-s-salud-provider-portal
    name: Triple-S Salud Provider Portal
    description: >-
      Mi Triple-S is the online provider portal for Triple-S Salud, offering healthcare
      providers access to insured eligibility verification, claims and payments management,
      re-credentialing, and provider directory. Supports electronic claims submission
      via EDI 837 transactions.
    humanURL: https://service.ssspr.com/provider/login.aspx
    baseURL: https://service.ssspr.com
    tags:
      - Provider Portal
      - Healthcare
      - Claims
      - Eligibility
      - EDI
    properties:
      - type: Provider Portal
        url: https://service.ssspr.com/provider/login.aspx
      - type: Documentation
        url: https://salud.grupotriples.com/en/providers/

  - aid: triple-s-management:triple-s-advantage-provider-portal
    name: Triple-S Advantage Provider Information
    description: >-
      Provider resources for Triple-S Advantage, the Medicare Advantage plan operated
      by Triple-S in Puerto Rico, including eligibility, prior authorizations, and
      claims management tools.
    humanURL: https://advantage.grupotriples.com/en/providers/
    baseURL: https://advantage.grupotriples.com
    tags:
      - Medicare Advantage
      - Provider Portal
      - Healthcare
    properties:
      - type: Documentation
        url: https://advantage.grupotriples.com/en/providers/

