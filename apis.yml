created: '2026-03-24'
modified: '2026-05-03'
specificationVersion: '0.19'
description: >-
  Triple-S Management Corporation is the largest managed care company in Puerto Rico
  in terms of membership, providing health, life, and property and casualty insurance.
  A subsidiary of GuideWell (parent of Florida Blue), Triple-S operates as an independent
  licensee of the Blue Cross Blue Shield Association for Puerto Rico and the U.S. Virgin
  Islands. Its subsidiaries include Triple-S Salud (managed care), Triple-S Advantage
  (Medicare Advantage), Triple-S Vida (life insurance), Triple-S Propiedad (property
  and casualty), Salus (medical clinics), and CarePoint (IPA).
tags:
